version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nuqe
      POSTGRES_USER: nuqe
      POSTGRES_PASSWORD: nuqe_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build: ./api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      QUIDO_WEBHOOK_SECRET: ${QUIDO_WEBHOOK_SECRET}
    volumes:
      - ./api:/app
      - /app/node_modules

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '5173:5173'
    env_file:
      - .env
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
