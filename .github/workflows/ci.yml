name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    name: API tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nuqe
          POSTGRES_PASSWORD: nuqe_secret
          POSTGRES_DB: nuqe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: api
      - name: Run migrations
        run: npm run migrate
        working-directory: api
        env:
          DATABASE_URL: postgresql://nuqe:nuqe_secret@localhost:5432/nuqe_test
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: api
        env:
          DATABASE_URL: postgresql://nuqe:nuqe_secret@localhost:5432/nuqe_test
          TEST_DATABASE_URL: postgresql://nuqe:nuqe_secret@localhost:5432/nuqe_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-min-32-chars-long
          NODE_ENV: test
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage/

  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: api
      - name: Lint
        run: npm run lint
        working-directory: api

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_API_URL: http://localhost:3001
          VITE_FIRM_NAME: Nuqe
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  lint-web:
    name: Lint web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Lint
        run: npm run lint
        working-directory: web
