services:
  - type: web
    name: nuqe-api
    runtime: node
    rootDir: api
    buildCommand: npm install && npm run migrate
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: nuqe-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nuqe-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: QUIDO_WEBHOOK_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: nuqe-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_FIRM_NAME
        value: Nuqe Demo

  - type: redis
    name: nuqe-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: nuqe-db
    databaseName: nuqe
    user: nuqe_user
