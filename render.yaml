services:
  - type: web
    name: nuqe-api
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: nuqe-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nuqe-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: nuqe-web
    runtime: static
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nuqe-api
          type: web
          property: host

  - type: redis
    name: nuqe-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: nuqe-db
    databaseName: nuqe
    user: nuqe_user
